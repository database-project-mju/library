<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>명지대학교 도서관</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .category-bar {
            background-color: #f8f9fa;
            border-top: 1px solid #dee2e6;
            border-bottom: 1px solid #dee2e6;
        }

        .category-bar a {
            color: #0d6efd;
            font-weight: 500;
            text-decoration: none;
            margin: 0 15px;
        }

        .category-bar a:hover {
            text-decoration: underline;
        }

        /* 카드 hover 효과 */
        .book-card:hover {
            transform: translateY(-3px);
            transition: 0.2s;
        }
    </style>
</head>
<body class="bg-light d-flex flex-column min-vh-100">

<!-- 상단 공통 네비게이션 -->
<div th:replace="~{fragments/nav :: navbar}"></div>

<!-- ✅ 홈화면 전용 카테고리 바 -->
<div class="category-bar py-2 text-center">
    <a href="/books/category/HUMANITIES">인문</a>
    <a href="/books/category/SOCIAL_SCIENCES">사회</a>
    <a href="/books/category/SCIENCE_ENGINEERING">과학/공학</a>
    <a href="/books/category/RELIGION">종교</a>
    <a href="/books/category/FOREIGN_BOOKS">외국도서</a>
    <a href="/books/category/TEXTBOOK_EXAM">교재/수험서</a>
    <a href="/books/category/ARTS">예술</a>
</div>


<div class="container mt-5 flex-grow-1">
    <!-- ✅ 신착자료 섹션 -->
    <div class="mb-5">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="fw-semibold">신착자료</h4>
            <a href="#" class="text-decoration-none small fw-semibold text-secondary">더보기 +</a>
        </div>
        <div class="row row-cols-1 row-cols-md-4 g-3">
            <div class="col" th:each="book : ${recentBooks}">
                <!-- ✅ 카드 전체 클릭 가능 -->
                <div class="card h-100 shadow-sm book-card position-relative">
                    <img th:src="${book.imageUrl}" class="card-img-top" alt="책 이미지"
                         onerror="this.src='https://via.placeholder.com/150x200';">
                    <div class="card-body">
                        <h6 class="card-title text-truncate" th:text="${book.title}">도서 제목</h6>
                        <p class="card-text text-muted small mb-1" th:text="${book.writer}">저자</p>
                        <p class="card-text text-muted small"
                           th:text="${#temporals.format(book.createdAt, 'yyyy.MM.dd')}">등록일</p>
                    </div>
                    <a th:href="@{/book/{id}(id=${book.id})}" class="stretched-link"></a>
                </div>
            </div>
        </div>
    </div>

    <!-- 💙 좋아요순 인기자료 섹션 -->
    <div class="mb-5">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="fw-semibold">인기자료 (좋아요순)</h4>
            <a href="#" class="text-decoration-none small fw-semibold text-secondary">더보기 +</a>
        </div>
        <div class="row row-cols-1 row-cols-md-4 g-3">
            <div class="col" th:each="book : ${popularByLikes}">
                <div class="card h-100 shadow-sm book-card position-relative">
                    <img th:src="${book.imageUrl}" class="card-img-top" alt="책 이미지"
                         onerror="this.src='https://via.placeholder.com/150x200';">
                    <div class="card-body">
                        <h6 class="card-title text-truncate" th:text="${book.title}">도서 제목</h6>
                        <p class="card-text text-muted small mb-1" th:text="${book.writer}">저자</p>
                        <span class="badge bg-danger">❤️ 인기</span>
                    </div>
                    <a th:href="@{/book/{id}(id=${book.id})}" class="stretched-link"></a>
                </div>
            </div>
        </div>
    </div>

    <!-- 📈 대출순 인기자료 섹션 -->
    <div class="mb-5">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="fw-semibold">인기자료 (대출순)</h4>
            <a href="#" class="text-decoration-none small fw-semibold text-secondary">더보기 +</a>
        </div>
        <div class="row row-cols-1 row-cols-md-4 g-3">
            <div class="col" th:each="book : ${popularByLending}">
                <div class="card h-100 shadow-sm book-card position-relative">
                    <img th:src="${book.imageUrl}" class="card-img-top" alt="책 이미지"
                         onerror="this.src='https://via.placeholder.com/150x200';">
                    <div class="card-body">
                        <h6 class="card-title text-truncate" th:text="${book.title}">도서 제목</h6>
                        <p class="card-text text-muted small mb-1" th:text="${book.writer}">저자</p>
                        <span class="badge bg-primary">📘 대출 인기</span>
                    </div>
                    <a th:href="@{/book/{id}(id=${book.id})}" class="stretched-link"></a>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ✅ 항상 하단에 고정되는 footer -->
<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
