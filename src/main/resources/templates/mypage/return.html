<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>반납 목록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .sidebar {
            width: 230px;
            min-height: 100vh;
            background-color: #f8f9fa;
            border-right: 1px solid #dee2e6;
            padding-top: 20px;
        }

        .sidebar .menu-title {
            font-size: 1.3rem;
            font-weight: bold;
            padding: 15px 20px;
            margin-bottom: 15px;
            background-color: #e9ecef;
            border-radius: 10px;
            text-align: center;
        }

        .sidebar a {
            padding: 12px 20px;
            display: block;
            font-size: 1rem;
            color: #333;
            text-decoration: none;
            border-radius: 8px;
        }

        .sidebar a:hover {
            background-color: #dbe4ff;
            color: #0d6efd;
        }

        .content-area {
            padding: 30px;
        }

        table th, table td {
            vertical-align: middle;
        }

        .pagination a, .pagination span {
            margin: 0 5px;
        }
    </style>
</head>

<body>

<div th:replace="~{fragments/nav  :: navbar}"></div>

<div class="d-flex">

    <div class="sidebar">
        <div class="menu-title">내 서재</div>

        <a th:href="@{/mypage/lends}" class="menu-item">📘 대출 목록</a>
        <a th:href="@{/mypage/reserve}" class="menu-item">📚 예약 목록</a>
        <a th:href="@{/mypage/return}" class="menu-item">🔄 반납 목록</a>
        <a th:href="@{/mypage/like}" class="menu-item">❤️ 찜 목록</a>
        <a th:href="@{/mypage/review}" class="menu-item">✏️ 리뷰 조회</a>

        <div class="mt-auto text-center" style="padding: 20px;">
            <a th:href="@{/mypage/myInfo}" class="btn btn-outline-primary btn-sm w-100">🔒 비밀번호 수정</a>
        </div>
    </div>

    <div class="content-area flex-grow-1">

        <div class="container my-4">
            <h2 class="mb-4">내 반납 목록</h2>
            <h5 class="mb-3">
                총 <span th:text="${returnListDto.totalCount}"></span>개의 반납 기록이 있습니다.
            </h5>

            <div class="row row-cols-1 g-2">
                <div class="col" th:each="item : ${returnListDto.returnList}">
                    <div class="card shadow-sm">
                        <div class="row g-0 align-items-center">

                            <!-- 책 이미지 -->
                            <div class="col-auto p-2">
                                <img th:src="@{'/images/book' + ${item.bookId} + '.jpg'}"
                                     class="img-fluid rounded"
                                     style="height: 100px; width: auto;"
                                     alt="책 이미지">
                            </div>

                            <!-- 책 내용 -->
                            <div class="col p-2">
                                <h5 class="card-title mb-1" th:text="${item.bookName}" style="font-size: 1rem;"></h5>

                                <p class="card-text mb-1" style="font-size: 0.85rem;">
                                    <small class="text-muted"
                                           th:text="${item.bookAuthor} + ' | ' + ${item.publisher}">
                                    </small>
                                </p>

                                <p class="card-text mb-1" style="font-size: 0.8rem;">
                                    출판일: <span th:text="${item.publishDate}">YYYY-MM-DD</span>
                                </p>

                                <p class="card-text mb-1" style="font-size: 0.8rem;">
                                    대출일: <span th:text="${item.lendDate}">YYYY-MM-DD</span>
                                </p>

                                <p class="card-text mb-1" style="font-size: 0.8rem;">
                                    누적 대출 횟수:
                                    <span class="fw-bold text-primary" th:text="${item.lendCount}"></span> 회
                                </p>

                            </div>

                        </div>
                    </div>
                </div>
            </div>

        </div>

        <!-- 페이지네이션 -->
        <nav class="mt-3">
            <ul class="pagination justify-content-center">

                <li class="page-item" th:classappend="${returnListDto.currentPage == 0}? 'disabled'">
                    <a class="page-link"
                       th:href="@{/mypage/return(page=${returnListDto.currentPage - 1}, size=8)}">이전</a>
                </li>

                <li class="page-item"
                    th:each="i : ${#numbers.sequence(0, returnListDto.totalPage > 0 ? returnListDto.totalPage - 1 : 0)}"
                    th:classappend="${i == returnListDto.currentPage} ? 'active'">
                    <a class="page-link"
                       th:href="@{/mypage/return(page=${i}, size=8)}"
                       th:text="${i + 1}"></a>
                </li>

                <li class="page-item"
                    th:classappend="${returnListDto.currentPage + 1 >= returnListDto.totalPage}? 'disabled'">
                    <a class="page-link"
                       th:href="@{/mypage/return(page=${returnListDto.currentPage + 1}, size=8)}">다음</a>
                </li>

            </ul>
        </nav>

    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
