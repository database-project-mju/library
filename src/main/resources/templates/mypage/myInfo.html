<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>내 정보</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* 사이드바 스타일 */
        .sidebar {
            width: 230px;
            min-height: 100vh;
            background-color: #f8f9fa;
            border-right: 1px solid #dee2e6;
            padding-top: 20px;
        }

        .sidebar .menu-title {
            font-size: 1.3rem;
            font-weight: bold;
            padding: 15px 20px;
            margin-bottom: 15px;
            background-color: #e9ecef;
            border-radius: 10px;
            text-align: center;
        }

        .sidebar a {
            padding: 12px 20px;
            display: block;
            font-size: 1rem;
            color: #333;
            text-decoration: none;
            border-radius: 8px;
        }

        .sidebar a:hover {
            background-color: #dbe4ff;
            color: #0d6efd;
        }

        .content-area {
            padding: 30px;
        }
    </style>
</head>

<body>

<!-- 🔵 공통 네비게이션 -->
<div th:replace="~{fragments/nav :: navbar}"></div>

<div class="d-flex">

    <!-- 🔵 좌측 사이드바 -->
    <div class="sidebar">
        <div class="menu-title">내 서재</div>

        <a th:href="@{/mypage/lends}">📘 대출 목록</a>
        <a th:href="@{/mypage/reserve}">📚 예약 목록</a>
        <a th:href="@{/mypage/return}">🔄 반납 목록</a>
        <a th:href="@{/mypage/like}">❤️ 찜 목록</a>
        <a th:href="@{/mypage/review}">✏️ 리뷰 조회</a>

        <div class="mt-auto text-center" style="padding: 20px;">
            <a th:href="@{/mypage/myInfo}" class="btn btn-outline-primary btn-sm w-100">🔒 비밀번호 수정</a>
        </div>
    </div>

    <!-- 🔵 오른쪽 콘텐츠 영역 -->
    <div class="content-area flex-grow-1">

        <div class="container my-4">

            <h2 class="fw-semibold mb-4">내 정보</h2>

            <!-- 🔹 회원 기본 정보 -->
            <div class="card mb-4 shadow-sm">
                <div class="card-header">
                    <h5 class="mb-0">회원 기본 정보</h5>
                </div>

                <div class="card-body">
                    <p><strong>학번:</strong> <span th:text="${member.studentNo}"></span></p>
                    <p><strong>이름:</strong> <span th:text="${member.name}"></span></p>
                </div>
            </div>

            <!-- 🔹 비밀번호 변경 -->
            <div class="card shadow-sm">
                <div class="card-header">
                    <h5 class="mb-0">비밀번호 변경</h5>
                </div>

                <div class="card-body">

                    <!-- 성공/에러 메시지 -->
                    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form th:action="@{/mypage/myInfo/password}" method="post">

                        <div class="mb-3">
                            <label class="form-label">현재 비밀번호</label>
                            <input type="password" class="form-control" name="currentPassword" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">새 비밀번호</label>
                            <input type="password" class="form-control" name="newPassword" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">새 비밀번호 확인</label>
                            <input type="password" class="form-control" name="confirmPassword" required>
                        </div>

                        <button class="btn btn-primary mt-2">비밀번호 변경</button>
                    </form>
                </div>
            </div>

        </div>
    </div>

</div>

<!-- Footer -->
<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
