<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>대출 목록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* 사이드바 스타일 */
        .sidebar {
            width: 230px;
            min-height: 100vh;
            background-color: #f8f9fa;
            border-right: 1px solid #dee2e6;
            padding-top: 20px;
        }

        .sidebar .menu-title {
            font-size: 1.3rem;
            font-weight: bold;
            padding: 15px 20px;
            margin-bottom: 15px;
            background-color: #e9ecef;
            border-radius: 10px;
            text-align: center;
        }

        .sidebar a {
            padding: 12px 20px;
            display: block;
            font-size: 1rem;
            color: #333;
            text-decoration: none;
            border-radius: 8px;
        }

        .sidebar a:hover {
            background-color: #dbe4ff;
            color: #0d6efd;
        }

        .content-area {
            padding: 30px;
        }

        /* 테이블 스타일 */
        table th, table td {
            vertical-align: middle;
        }

        .pagination a, .pagination span {
            margin: 0 5px;
        }
    </style>
</head>

<body>

<!-- 🔵 공통 네비게이션 -->
<div th:replace="~{fragments/nav  :: navbar}"></div>

<div class="d-flex">

    <!-- 🔵 좌측 사이드바 -->
    <div class="sidebar">
        <div class="menu-title">내 서재</div>

        <a th:href="@{/mypage/lends}" class="menu-item">📘 대출 목록</a>
        <a th:href="@{/mypage/reserve}" class="menu-item">📚 예약 목록</a>
        <a th:href="@{/mypage/return}" class="menu-item">🔄 반납 목록</a>
        <a th:href="@{/mypage/like}" class="menu-item">❤️ 찜 목록</a>
        <a th:href="@{/mypage/review}" class="menu-item">✏️ 리뷰 조회</a>
        <div class="mt-auto text-center" style="padding: 20px;">
            <a th:href="@{/mypage/myInfo}" class="btn btn-outline-primary btn-sm w-100">🔒 비밀번호 수정</a>
        </div>

    </div>

    <!-- 🔵 오른쪽 콘텐츠 영역 -->
    <div class="content-area flex-grow-1">

        <div class="container my-4">
            <h2 class="fw-semibold mb-4">내 대출 목록</h2>
            <h5 class="mb-3">
                총 <span th:text="${lendingListDto.getTotalCount()}"></span>개의 대출이 있습니다.
            </h5>
            <!-- 카드 리스트 -->
            <div class="row row-cols-1 g-2">
                <div class="col" th:each="lend : ${lendingListDto.lendingList}">
                    <div class="card shadow-sm">
                        <div class="row g-0 align-items-center">
                            <!-- 책 이미지 -->
                            <div class="col-auto p-2">
                                <img th:src="@{'/images/book' + ${lend.bookId} + '.jpg'}"
                                     class="img-fluid rounded"
                                     style="height: 100px; width: auto;"
                                     alt="책 이미지">
                            </div>
                            <!-- 책 정보 + 버튼 -->
                            <div class="col p-2">
                                <h5 class="card-title mb-1" th:text="${lend.bookName}" style="font-size: 1rem;">책 제목</h5>
                                <p class="card-text mb-1" style="font-size: 0.85rem;">
                                    <small class="text-muted" th:text="${lend.bookAuthor} + ' | ' + ${lend.publisher}">저자 | 출판사</small>
                                </p>
                                <p class="card-text mb-1" style="font-size: 0.8rem;">
                                    대출일: <span th:text="${lend.lendDate}">YYYY-MM-DD</span>
                                </p>
                                <p class="card-text mb-1" style="font-size: 0.8rem;">
                                    예상반납일: <span th:text="${lend.dueDate}">YYYY-MM-DD</span>
                                </p>

                                <p class="card-text mb-1" style="font-size: 0.8rem;">
                                    연장 가능 여부:
                                    <span th:if="${lend.extendable}"
                                          class="text-primary fw-bold">가능</span>
                                    <span th:if="${!lend.extendable}"
                                          class="text-danger fw-bold">불가능</span>
                                </p>

                                <!-- 연장 가능할 때만 버튼 표시 -->
                                <form th:if="${lend.extendable}" th:action="@{/lend/extend}" method="post">
                                    <input type="hidden" name="lendId" th:value="${lend.lendId}">
                                    <button type="submit" class="btn btn-outline-primary btn-sm">대출 연장</button>
                                </form>

                                <!-- 연장 불가능일 때는 버튼 대신 비활성 표시 -->
                                <button th:if="${!lend.extendable}"
                                        class="btn btn-secondary btn-sm" disabled>
                                    연장 불가
                                </button>




                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <!-- 페이지네이션 -->
        <nav class="mt-3">
            <ul class="pagination justify-content-center">
                <!-- 이전 -->
                <li class="page-item" th:classappend="${lendingListDto.currentPage == 0}? 'disabled'">
                    <a class="page-link" th:href="@{/mypage/lends(page=${lendingListDto.currentPage - 1}, size=8)}">이전</a>
                </li>

                <li class="page-item"
                    th:each="i : ${#numbers.sequence(0, lendingListDto.totalPage > 0 ? lendingListDto.totalPage - 1 : 0)}"
                    th:classappend="${i == lendingListDto.currentPage} ? 'active'">
                    <a class="page-link"
                       th:href="@{/mypage/lends(page=${i}, size=8)}"
                       th:text="${i + 1}"></a>
                </li>

                <!-- 다음 -->
                <li class="page-item" th:classappend="${lendingListDto.currentPage + 1 >= lendingListDto.totalPage}? 'disabled'">
                    <a class="page-link" th:href="@{/mypage/lends(page=${lendingListDto.currentPage + 1}, size=8)}">다음</a>
                </li>
            </ul>
        </nav>


    </div>
</div>

<!-- Footer -->
<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
