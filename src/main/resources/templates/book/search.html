<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>도서 검색 결과</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* 이미지 크기 통일 */
        .book-image {
            width: 85px;
            height: 120px;
            object-fit: cover;
            border-radius: 6px;
            flex-shrink: 0;
            background-color: #f8f9fa;
        }

        /* 책소개 두 줄 제한 */
        .book-description {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 0.9rem;
            color: #6c757d;
            margin-bottom: 2px; /* ✅ 상태와 간격 줄이기 */
        }

        /* 버튼 컨테이너 */
        .book-action-container {
            display: flex;
            flex-direction: column;
            align-items: end;
            gap: 6px; /* 버튼 간격 */
            margin-left: 12px;
        }

        /* 버튼 스타일 */
        .book-action-btn {
            width: 65px;
            font-size: 0.85rem;
            padding: 4px 0;
        }

        /* 리스트 전체 */
        .list-group-item {
            padding: 14px 18px;
        }

        /* 이미지+정보+버튼 세로 중앙정렬 */
        .book-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center; /* ✅ 핵심: 수직 중앙 정렬 */
        }

        /* 정보 간 여백 최소화 */
        .book-info p {
            margin-bottom: 4px;
        }
    </style>
</head>
<body class="bg-light d-flex flex-column min-vh-100">

<!-- ✅ 공통 네비게이션 -->
<div th:replace="~{fragments/nav :: navbar}"></div>

<div class="container mt-5 flex-grow-1">

    <!-- 제목 -->
    <div class="text-center mb-4">
        <h3 class="fw-bold text-primary">🔍 도서 검색 결과</h3>
        <p class="text-secondary mt-2" th:if="${keyword}" th:text="'검색어: ' + ${keyword}"></p>
    </div>

    <!-- 메시지 -->
    <div th:if="${message}" class="alert alert-warning text-center mt-4" role="alert">
        <span th:text="${message}"></span>
    </div>

    <!-- 검색 결과 목록 -->
    <div class="list-group" th:if="${!#lists.isEmpty(searchResults)}">
        <div class="list-group-item list-group-item-action book-item-row"
             th:each="book : ${searchResults}">

            <!-- 왼쪽: 이미지 + 정보 -->
            <div class="d-flex align-items-start">
                <img th:src="${book.imageUrl}"
                     alt="책 이미지"
                     class="book-image me-3"
                     onerror="this.src='https://via.placeholder.com/85x120';">

                <div class="book-info">
                    <h6 class="fw-bold mb-1 text-truncate">
                        <a th:href="@{/book/{id}(id=${book.id})}"
                           th:text="${book.title}"
                           class="text-decoration-none text-dark"></a>
                    </h6>
                    <p class="text-muted small">
                        <span th:text="${book.writer}">저자</span> |
                        <span th:text="${book.publisher}">출판사</span> |
                        <span th:text="'출판일: ' + ${#temporals.format(book.publishDate, 'yyyy.MM.dd')}"></span>
                    </p>
                    <p class="book-description" th:text="${book.description}">책 설명...</p>
                    <span class="badge"
                          th:classappend="${book.lendStatus == '대출중'} ? 'bg-danger' : 'bg-success'"
                          th:text="${book.lendStatus}">대출 상태</span>
                </div>
            </div>

            <!-- 오른쪽: 버튼 (수직 중앙정렬됨) -->
            <div class="book-action-container">
                <button class="btn btn-outline-primary btn-sm book-action-btn">예약</button>

                <form th:action="@{/likeBook/{id}(id=${book.id})}"
                      method="post"
                      th:if="${!book.liked}">
                    <button type="submit" class="btn btn-outline-danger btn-sm book-action-btn">🤍 찜</button>
                </form>

                <form th:action="@{/likeBook/{id}(id=${book.id})}"
                      method="post"
                      th:if="${book.liked}">
                    <input type="hidden" name="_method" value="delete"/>
                    <button type="submit" class="btn btn-danger btn-sm book-action-btn">❤️ 찜</button>
                </form>
            </div>
        </div>
    </div>

    <!-- 페이지네이션 -->
    <nav th:if="${totalPages > 1}" class="mt-4">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/book/search(keyword=${keyword}, page=${currentPage - 1})}">이전</a>
            </li>

            <li class="page-item disabled">
                <span class="page-link" th:text="${currentPage + 1} + ' / ' + ${totalPages}"></span>
            </li>

            <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/book/search(keyword=${keyword}, page=${currentPage + 1})}">다음</a>
            </li>
        </ul>
    </nav>
</div>

<!-- ✅ 공통 footer -->
<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
