<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>도서 검색 결과</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* 이미지 크기 통일 */
        .book-image {
            width: 85px;
            height: 120px;
            object-fit: cover;
            border-radius: 6px;
            flex-shrink: 0;
            background-color: #f8f9fa;
        }

        /* 책소개 두 줄 제한 */
        .book-description {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 0.9rem;
            color: #6c757d;
            margin-bottom: 2px;
        }

        .book-action-container {
            display: flex;
            flex-direction: column;
            align-items: end;
            gap: 6px;
            margin-left: 12px;
        }

        .book-action-btn {
            width: 65px;
            font-size: 0.85rem;
            padding: 4px 0;
        }

        .list-group-item {
            padding: 14px 18px;
        }

        .book-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .book-info p {
            margin-bottom: 4px;
        }
    </style>
</head>
<body class="bg-light d-flex flex-column min-vh-100">

<!-- ✅ 공통 네비게이션 -->
<div th:replace="~{fragments/nav :: navbar}"></div>

<div class="container mt-5 flex-grow-1">

    <div class="text-center mb-4">
        <h3 class="fw-bold text-primary">🔍 도서 검색 결과</h3>
        <p class="text-secondary mt-2" th:if="${keyword}" th:text="'검색어: ' + ${keyword}"></p>
        <!-- ✅ 카테고리 표시 추가 -->
        <p class="text-secondary mt-2" th:if="${category}"
           th:text="'카테고리: ' + ${category.korean}">
        </p>
    </div>

    <div th:if="${message}" class="alert alert-warning text-center mt-4" role="alert">
        <span th:text="${message}"></span>
    </div>

    <!-- 검색 결과 목록 -->
    <div class="list-group" th:if="${!#lists.isEmpty(searchResults)}">
        <div class="list-group-item list-group-item-action book-item-row"
             th:each="book : ${searchResults}"
             th:attr="data-book-id=${book.id}">

            <div class="d-flex align-items-start">
                <img th:src="${book.imageUrl}"
                     alt="책 이미지"
                     class="book-image me-3"
                     onerror="this.src='https://via.placeholder.com/85x120';">

                <div class="book-info">
                    <h6 class="fw-bold mb-1 text-truncate">
                        <a th:href="@{/book/{id}(id=${book.id})}"
                           th:text="${book.title}"
                           class="text-decoration-none text-dark"></a>
                    </h6>
                    <p class="text-muted small">
                        <span th:text="${book.writer}">저자</span> |
                        <span th:text="${book.publisher}">출판사</span> |
                        <span th:text="'출판일: ' + ${#temporals.format(book.publishDate, 'yyyy.MM.dd')}"></span>
                    </p>
                    <p class="book-description" th:text="${book.description}">책 설명...</p>
                    <span class="badge"
                          th:classappend="${book.lendStatus == '대출중'} ? 'bg-danger' : 'bg-success'"
                          th:text="${book.lendStatus}">대출 상태</span>
                </div>
            </div>

            <!-- 오른쪽 버튼 -->
            <div class="book-action-container">

                <!-- ✅ 예약 버튼 -->
                <button type="button"
                        class="btn btn-outline-primary btn-sm book-action-btn reserve-btn"
                        th:data-book-id="${book.id}"
                        th:disabled="${!book.canReserve}"
                        th:text="${book.canReserve ? '예약' : '예약불가'}">
                </button>

                <!-- ❤️ 찜 버튼 -->
                <button type="button"
                        class="btn btn-sm book-action-btn like-btn"
                        th:data-book-id="${book.id}"
                        th:data-liked="${book.liked}"
                        th:classappend="${book.liked} ? 'btn-danger' : 'btn-outline-danger'"
                        th:text="${book.liked} ? '❤️ 찜' : '🤍 찜'">
                </button>
            </div>
        </div>
    </div>

    <!-- 페이지네이션 -->
    <nav th:if="${totalPages > 1}" class="mt-4">
        <ul class="pagination justify-content-center">

            <!-- 이전 버튼 -->
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/book/search(keyword=${keyword}, category=${category}, page=${currentPage - 1})}">
                    이전
                </a>
            </li>

            <li class="page-item disabled">
                <span class="page-link" th:text="${currentPage + 1} + ' / ' + ${totalPages}"></span>
            </li>

            <!-- 다음 버튼 -->
            <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/book/search(keyword=${keyword}, category=${category}, page=${currentPage + 1})}">
                    다음
                </a>
            </li>

        </ul>
    </nav>

</div>

<!-- ✅ 공통 footer -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script>
    // ❤️ 찜 버튼
    document.addEventListener("DOMContentLoaded", () => {
        document.querySelectorAll(".like-btn").forEach(btn => {
            btn.addEventListener("click", async () => {
                const bookId = btn.dataset.bookId;
                const liked = btn.dataset.liked === "true";

                const response = await fetch(`/likeBook/${bookId}`, {
                    method: liked ? "DELETE" : "POST",
                    headers: { "X-Requested-With": "XMLHttpRequest" }
                });

                if (response.ok) {
                    btn.dataset.liked = (!liked).toString();
                    btn.classList.toggle("btn-danger", !liked);
                    btn.classList.toggle("btn-outline-danger", liked);
                    btn.textContent = liked ? "🤍 찜" : "❤️ 찜";
                } else if (response.status === 401) {
                    alert("로그인 후 이용해주세요.");
                    window.location.href = "/login";
                } else {
                    alert("찜 처리 중 오류가 발생했습니다.");
                }
            });
        });

        // ✅ 예약 버튼
        document.querySelectorAll(".reserve-btn").forEach(btn => {
            btn.addEventListener("click", async () => {
                const bookId = btn.dataset.bookId;

                try {
                    const response = await fetch(`/reservation/${bookId}`, {
                        method: "POST",
                        headers: { "X-Requested-With": "XMLHttpRequest" }
                    });

                    if (response.ok) {
                        alert("✅ 예약이 완료되었습니다!");
                        btn.disabled = true;
                        btn.textContent = "예약불가";
                        btn.classList.remove("btn-outline-primary");
                        btn.classList.add("btn-secondary");
                    } else if (response.status === 401) {
                        alert("로그인 후 이용해주세요.");
                        window.location.href = "/login";
                    } else {
                        const msg = await response.text();
                        alert("⚠️ " + msg);
                    }
                } catch (e) {
                    alert("서버 통신 오류 발생");
                }
            });
        });
    });
</script>

</body>
</html>
