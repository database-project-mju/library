<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${book.title} + ' - 도서 상세정보'">도서 상세정보</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* 버튼 통일 스타일 */
        .book-action-btn {
            min-width: 90px;
            height: 38px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body class="bg-light d-flex flex-column min-vh-100">

<!-- ✅ 공통 네비게이션 -->
<div th:replace="~{fragments/nav :: navbar}"></div>

<div class="container my-5 flex-grow-1">
    <!-- 책 기본 정보 -->
    <div class="card shadow-sm p-4">
        <div class="row g-4">
            <!-- 책 이미지 -->
            <div class="col-md-4 text-center">
                <img th:src="${book.imageUrl}"
                     alt="책 이미지"
                     class="img-fluid rounded shadow-sm"
                     onerror="this.src='https://via.placeholder.com/200x280';"
                     style="max-width: 70%;">
            </div>

            <!-- 책 정보 -->
            <div class="col-md-8">
                <!-- ✅ 도서 상태 표시 -->
                <p class="mb-2">
                    <span class="badge"
                          th:classappend="${book.lendStatus == '대출중'} ? 'bg-danger' : 'bg-success'"
                          th:text="${book.lendStatus}">대출 상태</span>
                </p>

                <h3 class="fw-bold mb-2" th:text="${book.title}">책 제목</h3>

                <p class="text-muted mb-1">
                    <strong>저자:</strong> <span th:text="${book.writer}">저자</span>
                </p>
                <p class="text-muted mb-1">
                    <strong>출판사:</strong> <span th:text="${book.publisher}">출판사</span>
                </p>
                <p class="text-muted mb-1">
                    <strong>출판일:</strong>
                    <span th:text="${#temporals.format(book.publishDate, 'yyyy.MM.dd')}"></span>
                </p>
                <p class="text-muted mb-1">
                    <strong>쪽수:</strong> <span th:text="${book.page}"></span>쪽
                </p>
                <p class="text-muted mb-1">
                    <strong>카테고리:</strong>
                    <span th:text="${book.category.korean}">카테고리</span>
                </p>
                <p class="text-muted mb-1">
                    <strong>등록일:</strong>
                    <span th:text="${#temporals.format(book.createdAt, 'yyyy.MM.dd HH:mm')}"></span>
                </p>

                <!-- ✅ 버튼 영역 (높이 통일 + 수평 정렬) -->
                <div class="mt-4 d-flex flex-wrap align-items-center gap-2">
                    <a href="/" class="btn btn-outline-primary book-action-btn">← 목록으로</a>

                    <!-- 예약 버튼 -->
                    <form>
                        <button type="button"
                                class="btn btn-outline-primary book-action-btn"
                                th:disabled="${!book.canReserve}"
                                th:text="${book.canReserve ? '예약' : '예약불가'}">
                            예약
                        </button>
                    </form>

<!--                    &lt;!&ndash; ❤️ 찜 버튼 &ndash;&gt;
                    <form th:action="@{/likeBook/{id}(id=${book.id})}"
                          method="post"
                          th:if="${!book.liked}">
                        <button type="submit" class="btn btn-outline-danger book-action-btn">🤍 찜</button>
                    </form>

                    <form th:action="@{/likeBook/{id}(id=${book.id})}"
                          method="post"
                          th:if="${book.liked}">
                        <input type="hidden" name="_method" value="delete"/>
                        <button type="submit" class="btn btn-danger book-action-btn">❤️ 찜</button>
                    </form>-->
                    <!-- ❤️ 찜 버튼 AJAX -->
                    <button type="button"
                            class="btn btn-sm book-action-btn like-btn"
                            th:data-book-id="${book.id}"
                            th:data-liked="${book.liked}"
                            th:classappend="${book.liked} ? 'btn-danger' : 'btn-outline-danger'"
                            th:text="${book.liked} ? '❤️ 찜' : '🤍 찜'">
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 책 설명 -->
    <div class="card mt-4 p-4 shadow-sm">
        <h5 class="fw-bold text-primary mb-3">📘 도서 소개</h5>
        <p th:text="${book.description}" class="text-muted" style="white-space: pre-line;">
            이 책은 ...
        </p>
    </div>
</div>

<!-- ✅ 공통 footer -->
<div th:replace="fragments/footer :: footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<script> // 찜 토글 - AJAX(Fetch API)로 요청
    document.addEventListener("DOMContentLoaded", () => {
        const likeButtons = document.querySelectorAll(".like-btn");

        likeButtons.forEach(btn => {
            btn.addEventListener("click", async (event) => {
                const button = event.currentTarget;
                const bookId = button.dataset.bookId;
                const liked = button.dataset.liked === "true";

                try {
                    const response = await fetch(`/likeBook/${bookId}`, {
                        method: liked ? "DELETE" : "POST",
                        headers: {
                            "X-Requested-With": "XMLHttpRequest"
                        }
                    });

                    if (response.ok) {
                        // ✅ 찜 상태 즉시 토글 (UI만 변경)
                        if (liked) {
                            button.dataset.liked = "false";
                            button.classList.remove("btn-danger");
                            button.classList.add("btn-outline-danger");
                            button.textContent = "🤍 찜";
                        } else {
                            button.dataset.liked = "true";
                            button.classList.remove("btn-outline-danger");
                            button.classList.add("btn-danger");
                            button.textContent = "❤️ 찜";
                        }
                    } else if (response.status === 401) {
                        alert("로그인 후 이용해주세요.");
                        window.location.href = "/login";
                    } else {
                        alert("찜 처리 중 오류가 발생했습니다.");
                    }
                } catch (e) {
                    console.error("찜 요청 실패:", e);
                    alert("서버와의 통신 중 오류가 발생했습니다.");
                }
            });
        });
    });
</script>
