<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${book.title} + ' - 도서 상세정보'">도서 상세정보</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* 버튼 통일 스타일 */
        .book-action-btn {
            min-width: 90px;
            height: 38px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body class="bg-light d-flex flex-column min-vh-100">

<!-- ✅ 공통 네비게이션 -->
<div th:replace="~{fragments/nav :: navbar}"></div>

<div class="container my-5 flex-grow-1">
     <!-- 책 기본 정보 -->
    <div class="card shadow-sm p-4">
        <div class="row g-4">
            <!-- 책 이미지 -->
            <div class="col-md-4 text-center">
                <img th:src="${book.imageUrl}"
                     alt="책 이미지"
                     class="img-fluid rounded shadow-sm"
                     onerror="this.src='https://via.placeholder.com/200x280';"
                     style="max-width: 70%;">
            </div>

            <!-- 책 정보 -->
            <div class="col-md-8">
                <!-- ✅ 도서 상태 표시 -->
                <p class="mb-2">
                    <span class="badge"
                          th:classappend="${book.lendStatus == '대출중'} ? 'bg-danger' : 'bg-success'"
                          th:text="${book.lendStatus}">대출 상태</span>
                </p>

                <h3 class="fw-bold mb-2" th:text="${book.title}">책 제목</h3>

                <p class="text-muted mb-1">
                    <strong>저자:</strong> <span th:text="${book.writer}">저자</span>
                </p>
                <p class="text-muted mb-1">
                    <strong>출판사:</strong> <span th:text="${book.publisher}">출판사</span>
                </p>
                <p class="text-muted mb-1">
                    <strong>출판일:</strong>
                    <span th:text="${#temporals.format(book.publishDate, 'yyyy.MM.dd')}"></span>
                </p>
                <p class="text-muted mb-1">
                    <strong>쪽수:</strong> <span th:text="${book.page}"></span>쪽
                </p>
                <p class="text-muted mb-1">
                    <strong>카테고리:</strong>
                    <span th:text="${book.category.korean}">카테고리</span>
                </p>
                <p class="text-muted mb-1">
                    <strong>등록일:</strong>
                    <span th:text="${#temporals.format(book.createdAt, 'yyyy.MM.dd HH:mm')}"></span>
                </p>

                <!-- ✅ 버튼 영역 (높이 통일 + 수평 정렬) -->
                <div class="mt-4 d-flex flex-wrap align-items-center gap-2">
                    <a href="/" class="btn btn-outline-primary book-action-btn">← 목록으로</a>

                    <!-- ✅ 예약 버튼 -->
                    <button type="button"
                            class="btn btn-outline-primary book-action-btn reserve-btn"
                            th:data-book-id="${book.id}"
                            th:disabled="${!book.canReserve}"
                            th:text="${book.canReserve ? '예약' : '예약불가'}">
                    </button>

                    <!-- ❤️ 찜 버튼 -->
                    <button type="button"
                            class="btn btn-sm book-action-btn like-btn"
                            th:data-book-id="${book.id}"
                            th:data-liked="${book.liked}"
                            th:classappend="${book.liked} ? 'btn-danger' : 'btn-outline-danger'"
                            th:text="${book.liked} ? '❤️ 찜' : '🤍 찜'">
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 책 설명 -->
    <div class="card mt-4 p-4 shadow-sm">
        <h5 class="fw-bold text-primary mb-3">📘 도서 소개</h5>
        <p th:text="${book.description}" class="text-muted" style="white-space: pre-line;">
            이 책은 ...
        </p>
    </div>

    <div class="card mt-4 p-4 shadow-sm">
        <h5 class="fw-bold text-primary mb-3">💬 리뷰</h5>
        
        <form th:action="@{/book/{id}/reviews(id=${book.id})}" method="POST">
            <div class="mb-2">
                <label for="reviewText" class="form-label">리뷰 내용</label>
                <textarea id="reviewText" name="reviewText" class="form-control" rows="3" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary">리뷰 등록</button>
        </form>
        
        <hr class="my-4">

        <div th:if="${#lists.isEmpty(book.reviews)}">
            <p class="text-muted">아직 작성된 리뷰가 없습니다.</p>
        </div>
        
        <div th:each="review : ${book.reviews}">
            <div class="mb-3">
                <strong th:text="${review.member.name}">작성자명</strong>
                
                <p th:text="${review.reviewText}" class="mt-1">리뷰 내용입니다.</p>
                
                </div>
            <hr>
        </div>
    </div>
    </div> <div th:replace="~{fragments/footer :: footer}"></div> <!-- ✅ 공통 footer -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // ❤️ 찜 버튼 - AJAX (기존 코드 유지)
    document.addEventListener("DOMContentLoaded", () => {
        document.querySelectorAll(".like-btn").forEach(btn => {
            btn.addEventListener("click", async () => {
                const bookId = btn.dataset.bookId;
                const liked = btn.dataset.liked === "true";

                const response = await fetch(`/likeBook/${bookId}`, {
                    method: liked ? "DELETE" : "POST",
                    headers: { "X-Requested-With": "XMLHttpRequest" }
                });

                if (response.ok) {
                    btn.dataset.liked = (!liked).toString();
                    btn.classList.toggle("btn-danger", !liked);
                    btn.classList.toggle("btn-outline-danger", liked);
                    btn.textContent = liked ? "🤍 찜" : "❤️ 찜";
                } else if (response.status === 401) {
                    alert("로그인 후 이용해주세요.");
                    window.location.href = "/login";
                } else {
                    alert("찜 처리 중 오류가 발생했습니다.");
                }
            });
        });

        // ✅ 예약 버튼 - AJAX (기존 코드 유지)
        document.querySelectorAll(".reserve-btn").forEach(btn => {
            btn.addEventListener("click", async () => {
                const bookId = btn.dataset.bookId;

                try {
                    const response = await fetch(`/reservation/${bookId}`, {
                        method: "POST",
                        headers: { "X-Requested-With": "XMLHttpRequest" }
                    });

                    if (response.ok) {
                        alert("✅ 예약이 완료되었습니다!");
                        btn.disabled = true;
                        btn.textContent = "예약불가";
                        btn.classList.remove("btn-outline-primary");
                        btn.classList.add("btn-secondary");
                    } else if (response.status === 401) {
                        alert("로그인 후 이용해주세요.");
                        window.location.href = "/login";
                    } else {
                        const msg = await response.text();
                        alert("⚠️ " + msg);
                    }
                } catch (e) {
                    alert("서버 통신 중 오류가 발생했습니다.");
                }
            });
        });
    });
</script>

</body>
</html>
