<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>관리자 - 리뷰 관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .sidebar {
            width: 250px;
            background-color: #f8f9fa;
            border-right: 1px solid #dee2e6;
            padding-top: 20px;
            flex-shrink: 0;
        }
        .sidebar .menu-title {
            font-size: 1.3rem;
            font-weight: bold;
            padding: 15px 20px;
            margin-bottom: 15px;
            background-color: #e9ecef; 
            border-radius: 10px;
            text-align: center;
        }
        .sidebar .menu-category {
            font-size: 0.85rem;
            font-weight: bold;
            color: #6c757d;
            padding: 10px 25px 5px;
            margin-top: 10px;
            text-transform: uppercase;
        }
        .sidebar a {
            padding: 10px 25px;
            display: block;
            font-size: 1rem;
            color: #333;
            text-decoration: none;
        }
        .sidebar a:hover {
            background-color: #e9ecef;
            color: #0d6efd;
        }
        .sidebar a.active {
            background-color: #dbe4ff;
            color: #0d6efd;
            font-weight: bold;
        }

        .content-area {
            padding: 40px;
            width: 100%;
        }

        table th, table td {
            vertical-align: middle;
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">

<div th:replace="~{fragments/nav :: navbar}"></div>

<div class="d-flex flex-grow-1">

    <div class="sidebar">
        <div class="menu-title">관리자 페이지</div>

        <div class="menu-category">데스크 업무</div>
        <a th:href="@{/admin/lending}">📅 대출 / 반납</a>
        <a th:href="@{/admin/lending/overdue}">⚠️ 연체 현황</a>

        <div class="menu-category">회원 관리</div>
        <a th:href="@{/admin/members}">👥 회원 조회 / 삭제</a>
        <a th:href="@{/admin/members/new}">➕ 회원 추가</a>

        <div class="menu-category">도서 관리</div>
        <a th:href="@{/admin/books}">📚 도서 조회 / 삭제</a>
        <a th:href="@{/admin/books/new}">➕ 도서 추가</a>

        <div class="menu-category">리뷰</div>
        <a th:href="@{/admin/reviews}" class="active">💬 리뷰 관리</a>
    </div>

    <div class="content-area">
        <div class="container-fluid">
            
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-semibold">리뷰 관리</h2>
                <span class="badge bg-secondary bg-opacity-25 text-dark fs-6 rounded-pill border" 
                      th:text="'총 ' + ${reviewPage.totalElements} + '건'"></span>
            </div>

            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-light border-bottom">
                        <tr>
                            <th class="ps-4">ID</th>
                            <th>도서 제목</th>
                            <th>작성자 (학번)</th>
                            <th>내용</th>
                            <th>등록일</th>
                            <th class="text-center">관리</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="review : ${reviewPage.content}">
                            <td class="ps-4" th:text="${review.id}"></td>
                            <td>
                                <a th:href="@{/book/{id}(id=${review.book.id})}" 
                                   class="text-decoration-none fw-bold text-dark"
                                   th:text="${review.book.title}"></a>
                            </td>
                            <td>
                                <span th:text="${review.member.name}"></span>
                                <small class="text-muted ms-1" th:text="'(' + ${review.member.studentNo} + ')'"></small>
                            </td>
                            <td th:text="${review.reviewText}" 
                                style="max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"
                                class="text-secondary"></td>
                            <td th:text="${#temporals.format(review.createdAt, 'yyyy-MM-dd')}"></td>
                            <td class="text-center">
                                <form th:action="@{/admin/reviews/{id}/delete(id=${review.id})}" method="POST"
                                      onsubmit="return confirm('정말로 이 리뷰를 삭제하시겠습니까?');">
                                    <button type="submit" class="btn btn-sm btn-outline-danger">삭제</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${reviewPage.empty}">
                            <td colspan="6" class="text-center py-5 text-muted">
                                등록된 리뷰가 없습니다.
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <nav th:if="${reviewPage.totalPages > 1}" class="mt-4">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${reviewPage.first} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/reviews(page=${reviewPage.number - 1})}">«</a>
                    </li>
                    
                    <li class="page-item" 
                        th:each="i : ${#numbers.sequence(0, reviewPage.totalPages - 1)}" 
                        th:classappend="${i == reviewPage.number} ? 'active'">
                        <a class="page-link" th:text="${i + 1}"
                           th:href="@{/admin/reviews(page=${i})}"></a>
                    </li>

                    <li class="page-item" th:classappend="${reviewPage.last} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/reviews(page=${reviewPage.number + 1})}">»</a>
                    </li>
                </ul>
            </nav>

        </div>
    </div>

</div> 

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
