<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>관리자 - 회원 목록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

    <h1 class="mb-3">학생 조회</h1>
    
    <form th:action="@{/admin/members}" method="GET" class="mb-3">
        <div class="input-group">
            <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="학번, 이름으로 검색">
            <button type="submit" class="btn btn-primary">검색</button>
        </div>
    </form>

    <div class="mb-3">
        <a href="/admin/members/new" class="btn btn-success">학생 추가하기</a>
    </div>
    
    <table class="table table-hover">
        <thead class="table-light">
            <tr>
                <th>학번</th>
                <th>이름</th>
                <th>권한</th>
                <th>가입일</th>
                </tr>
        </thead>
        <tbody>
            <tr th:each="member : ${membersPage.content}">
                <td th:text="${member.studentNo}"></td>
                <td th:text="${member.name}"></td>
                <td th:text="${member.memberRole}"></td>
                <td th:text="${#temporals.format(member.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
            </tr>
        </tbody>
    </table>

    <nav th:if="${membersPage.totalPages > 1}" class="mt-4">
        <ul class="pagination justify-content-center">
            
            <li class="page-item" th:classappend="${membersPage.first} ? 'disabled'">
                <a class="page-link" 
                   th:href="@{/admin/members(keyword=${keyword}, page=${membersPage.number - 1})}">이전</a>
            </li>

            <li class="page-item disabled">
                <span class="page-link" th:text="${membersPage.number + 1} + ' / ' + ${membersPage.totalPages}"></span>
            </li>

            <li class="page-item" th:classappend="${membersPage.last} ? 'disabled'">
                <a class="page-link" 
                   th:href="@{/admin/members(keyword=${keyword}, page=${membersPage.number + 1})}">다음</a>
            </li>
        </ul>
    </nav>

    </div> <div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
