<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>관리자 - 학생 추가</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .sidebar {
            width: 250px;
            background-color: #f8f9fa;
            border-right: 1px solid #dee2e6;
            padding-top: 20px;
            flex-shrink: 0;
        }
        .sidebar .menu-title {
            font-size: 1.3rem;
            font-weight: bold;
            padding: 15px 20px;
            margin-bottom: 15px;
            background-color: #e9ecef; 
            border-radius: 10px;
            text-align: center;
        }
        .sidebar .menu-category {
            font-size: 0.85rem;
            font-weight: bold;
            color: #6c757d;
            padding: 10px 25px 5px;
            margin-top: 10px;
            text-transform: uppercase;
        }
        .sidebar a {
            padding: 10px 25px;
            display: block;
            font-size: 1rem;
            color: #333;
            text-decoration: none;
        }
        .sidebar a:hover {
            background-color: #e9ecef;
            color: #0d6efd;
        }
        .sidebar a.active {
            background-color: #dbe4ff;
            color: #0d6efd;
            font-weight: bold;
        }

        .content-area {
            padding: 40px;
            width: 100%;
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">

<div th:replace="~{fragments/nav :: navbar}"></div>

<div class="d-flex flex-grow-1">

    <div class="sidebar">
        <div class="menu-title">관리자 페이지</div>

        <div class="menu-category">데스크 업무</div>
        <a th:href="@{/admin/lending}">📅 대출 / 반납</a>
        <a th:href="@{/admin/lending/overdue}">⚠️ 연체 현황</a>

        <div class="menu-category">회원 관리</div>
        <a th:href="@{/admin/members}">👥 회원 조회 / 삭제</a>
        <a th:href="@{/admin/members/new}" class="active">➕ 회원 추가</a>

        <div class="menu-category">도서 관리</div>
        <a th:href="@{/admin/books}">📚 도서 조회 / 삭제</a>
        <a th:href="@{/admin/books/new}" >➕ 도서 추가</a>
        <a th:href="@{/admin/wish-books}" >✨ 희망도서 관리</a> 

        <div class="menu-category">리뷰</div>
        <a th:href="@{/admin/reviews}">💬 리뷰 관리</a>
    </div>

    <div class="content-area">
        <div class="container-fluid">
            
            <h2 class="fw-semibold mb-4 text-center">신규 회원(학생) 등록</h2>

            <div class="card shadow-sm border-0 col-md-8 col-lg-6 mx-auto">
                <div class="card-body p-4 p-md-5">
                    
                    <form action="/admin/members/create" method="POST">
                        
                        <div class="mb-3">
                            <label for="studentNo" class="form-label fw-bold">학번</label>
                            <input type="text" class="form-control" id="studentNo" name="studentNo" placeholder="학번을 입력하세요" required>
                        </div>
            
                        <div class="mb-3">
                            <label for="name" class="form-label fw-bold">이름</label>
                            <input type="text" class="form-control" id="name" name="name" placeholder="이름을 입력하세요" required>
                        </div>
            
                        <div class="mb-3">
                            <label for="password" class="form-label fw-bold">초기 비밀번호</label>
                            <input type="password" class="form-control" id="password" name="password" placeholder="비밀번호를 입력하세요" required>
                        </div>
            
                        <div class="mb-4">
                            <label for="memberRole" class="form-label fw-bold">권한 설정</label>
                            <select class="form-select" id="memberRole" name="memberRole">
                                <option value="STUDENT">학생 (STUDENT)</option>
                                <option value="ADMIN">관리자 (ADMIN)</option>
                            </select>
                        </div>
            
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="/admin/members" class="btn btn-secondary px-4">취소</a>
                            <button type="submit" class="btn btn-primary px-4">등록 완료</button>
                        </div>
                    </form>

                </div>
            </div>

        </div>
    </div>

</div> 

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
