<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>관리자 - 학생 추가</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<!-- ✅ 1. body 태그 (레이아웃 적용) -->
<body class="bg-light d-flex flex-column min-vh-100">

    <!-- ✅ 2. 네비게이션 바 -->
    <div th:replace="~{fragments/nav :: navbar}"></div>
    
    <!-- ✅ 3. 콘텐츠 래퍼(Wrapper) 추가 -->
    <div class="container my-5 flex-grow-1">

        <h1 class="fw-semibold mb-4 text-center">학생 추가</h1>

        <!-- ✅ 4. (개선) 폼이 너무 넓어지지 않게 card로 감싸고 중앙 정렬 -->
        <div class="card shadow-sm col-md-8 col-lg-6 mx-auto">
            <div class="card-body p-4 p-md-5">

                <form action="/admin/members/create" method="POST">
        
                    <div class="mb-3">
                        <label for="studentNo" class="form-label">학번</label>
                        <input type="text" class="form-control" id="studentNo" name="studentNo" required>
                    </div>
        
                    <div class="mb-3">
                        <label for="name" class="form-label">이름</label>
                        <input type="text" class="form-control" id="name" name="name" required>
                    </div>
        
                    <div class="mb-3">
                        <label for="password" class="form-label">초기 비밀번호</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
        
                    <div class="mb-3">
                        <label for="memberRole" class="form-label">권한</label>
                        <select class="form-select" id="memberRole" name="memberRole">
                            <option value="STUDENT">학생 (STUDENT)</option>
                            <option value="ADMIN">관리자 (ADMIN)</option>
                        </select>
                    </div>
        
                    <!-- ✅ 5. (개선) 버튼을 오른쪽 정렬 -->
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                        <a href="/admin/members" class="btn btn-secondary">취소</a>
                        <button type="submit" class="btn btn-primary">학생 추가</button>
                    </div>
                </form>

            </div> <!-- card-body 닫기 -->
        </div> <!-- card 닫기 -->

    </div> <!-- ✅ 3. 콘텐츠 래퍼 닫기 -->

    <!-- ✅ 6. 푸터 위치 수정 (stray </div> 제거) -->
    <div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
