<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"> <!-- ✅ 문자 인코딩 추가 -->
    <title>관리자 - 도서 목록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<!-- ✅ 1. <body> 태그에 레이아웃 클래스 적용 -->
<body class="bg-light d-flex flex-column min-vh-100">

    <!-- ✅ 2. 네비게이션 바 추가 -->
    <div th:replace="~{fragments/nav :: navbar}"></div>

    <!-- ✅ 3. 콘텐츠 래퍼(Wrapper) 추가 -->
    <div class="container my-5 flex-grow-1">

        <h1 class="fw-semibold mb-4">도서 조회</h1>
        
        <form th:action="@{/admin/books}" method="GET" class="mb-3">
            <div class="input-group">
                <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="도서 제목, 저자로 검색">
                <button type="submit" class="btn btn-primary">검색</button>
            </div>
        </form>
    
        <div class="mb-3">
            <a href="/admin/books/new" class="btn btn-success">신규 도서 등록 (수동)</a>
        </div>
        
        <table class="table table-hover">
            <thead class="table-light">
                <tr>
                    <th>ISBN</th>
                    <th>제목</th>
                    <th>저자</th>
                    <th>출판사</th>
                    <th>카테고리</th>
                    </tr>
            </thead>
            <tbody>
                <tr th:each="book : ${bookPage.content}">
                    <td th:text="${book.isbn}"></td>
                    <td th:text="${book.title}"></td>
                    <td th:text="${book.writer}"></td>
                    <td th:text="${book.publisher}"></td>
                    <td th:text="${book.category.korean}"></td> </tr>
            </tbody>
        </table>
    
        <nav th:if="${bookPage.totalPages > 1}" class="mt-4">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${bookPage.first} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/books(keyword=${keyword}, page=${bookPage.number - 1})}">이전</a>
                </li>
                <li class="page-item disabled">
                    <span class="page-link" th:text="${bookPage.number + 1} + ' / ' + ${bookPage.totalPages}"></span>
                </li>
                <li class="page-item" th:classappend="${bookPage.last} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/books(keyword=${keyword}, page=${bookPage.number + 1})}">다음</a>
                </li>
            </ul>
        </nav>
    
    </div> <!-- ✅ 3. 콘텐츠 래퍼 닫기 -->
    
    <!-- ✅ 4. 푸터 위치 수정 (stray </div> 제거) -->
    <div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
