<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>관리자 - 도서 관리</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .sidebar {
            width: 250px;
            background-color: #f8f9fa;
            border-right: 1px solid #dee2e6;
            padding-top: 20px;
            flex-shrink: 0;
        }
        .sidebar .menu-title {
            font-size: 1.3rem;
            font-weight: bold;
            padding: 15px 20px;
            margin-bottom: 15px;
            background-color: #e9ecef; 
            border-radius: 10px;
            text-align: center;
        }
        .sidebar .menu-category {
            font-size: 0.85rem;
            font-weight: bold;
            color: #6c757d;
            padding: 10px 25px 5px;
            margin-top: 10px;
            text-transform: uppercase;
        }
        .sidebar a {
            padding: 10px 25px;
            display: block;
            font-size: 1rem;
            color: #333;
            text-decoration: none;
        }
        .sidebar a:hover {
            background-color: #e9ecef;
            color: #0d6efd;
        }
        .sidebar a.active {
            background-color: #dbe4ff;
            color: #0d6efd;
            font-weight: bold;
        }

        .content-area {
            padding: 40px;
            width: 100%;
        }

        table th, table td {
            vertical-align: middle;
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">

<div th:replace="~{fragments/nav :: navbar}"></div>

<div class="d-flex flex-grow-1">

    <div class="sidebar">
        <div class="menu-title">관리자 페이지</div>

        <div class="menu-category">데스크 업무</div>
        <a th:href="@{/admin/lending}">📅 대출 / 반납</a>
        <a th:href="@{/admin/lending/overdue}">⚠️ 연체 현황</a>

        <div class="menu-category">회원 관리</div>
        <a th:href="@{/admin/members}">👥 회원 조회 / 삭제</a>
        <a th:href="@{/admin/members/new}">➕ 회원 추가</a>

        <div class="menu-category">도서 관리</div>
        <a th:href="@{/admin/books}"class="active">📚 도서 조회 / 삭제</a>
        <a th:href="@{/admin/books/new}" >➕ 도서 추가</a>
        <a th:href="@{/admin/wish-books}" >✨ 희망도서 관리</a> 

        <div class="menu-category">리뷰</div>
        <a th:href="@{/admin/reviews}">💬 리뷰 관리</a>
        
    </div>

    <div class="content-area">
        <div class="container-fluid">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-semibold">도서 관리</h2>
                <a href="/admin/books/new" class="btn btn-primary">
                    + 신규 도서 등록
                </a>
            </div>

            <div class="card p-4 mb-4 bg-light border-0 rounded-3">
                <form th:action="@{/admin/books}" method="GET" class="row g-2 align-items-center">
                    <div class="col-auto">
                        <span class="fw-bold">검색</span>
                    </div>
                    <div class="col">
                        <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="도서 제목 또는 저자로 검색하세요">
                    </div>
                    <div class="col-auto">
                        <button type="submit" class="btn btn-dark px-4">검색</button>
                    </div>
                </form>
            </div>

            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-light border-bottom">
                        <tr>
                            <th class="ps-4">ISBN</th>
                            <th>제목</th>
                            <th>저자</th>
                            <th>출판사</th>
                            <th>카테고리</th>
                            <th class="text-center">관리</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="book : ${bookPage.content}">
                            <td class="ps-4" th:text="${book.isbn}"></td>
                            <td class="fw-bold" th:text="${book.title}"></td>
                            <td th:text="${book.writer}"></td>
                            <td th:text="${book.publisher}"></td>
                            <td>
                                <span class="badge bg-secondary bg-opacity-10 text-secondary" 
                                      th:text="${book.category.korean}"></span>
                            </td>
                            <td class="text-center">
                                <a href="#" class="btn btn-sm btn-outline-danger">삭제</a>
                            </td>
                        </tr>
                        <tr th:if="${bookPage.empty}">
                            <td colspan="6" class="text-center py-5 text-muted">
                                등록된 도서가 없습니다.
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <nav th:if="${bookPage.totalPages > 1}" class="mt-4">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${bookPage.first} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/books(keyword=${keyword}, page=${bookPage.number - 1})}">«</a>
                    </li>
                    <li class="page-item" 
                        th:each="i : ${#numbers.sequence(0, bookPage.totalPages - 1)}" 
                        th:classappend="${i == bookPage.number} ? 'active'">
                        <a class="page-link" th:text="${i + 1}"
                           th:href="@{/admin/books(keyword=${keyword}, page=${i})}"></a>
                    </li>
                    <li class="page-item" th:classappend="${bookPage.last} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/books(keyword=${keyword}, page=${bookPage.number + 1})}">»</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>

</div> <div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
