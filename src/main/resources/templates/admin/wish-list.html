<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>관리자 - 희망도서 관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .sidebar {
            width: 250px;
            background-color: #f8f9fa;
            border-right: 1px solid #dee2e6;
            padding-top: 20px;
            flex-shrink: 0;
        }
        .sidebar .menu-title {
            font-size: 1.3rem;
            font-weight: bold;
            padding: 15px 20px;
            margin-bottom: 15px;
            background-color: #e9ecef; 
            border-radius: 10px;
            text-align: center;
        }
        .sidebar .menu-category {
            font-size: 0.85rem;
            font-weight: bold;
            color: #6c757d;
            padding: 10px 25px 5px;
            margin-top: 10px;
            text-transform: uppercase;
        }
        .sidebar a {
            padding: 10px 25px;
            display: block;
            font-size: 1rem;
            color: #333;
            text-decoration: none;
        }
        .sidebar a:hover {
            background-color: #e9ecef;
            color: #0d6efd;
        }
        .sidebar a.active {
            background-color: #dbe4ff;
            color: #0d6efd;
            font-weight: bold;
        }

        .content-area {
            padding: 40px;
            width: 100%;
        }

        table th, table td {
            vertical-align: middle;
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">

<div th:replace="~{fragments/nav :: navbar}"></div>

<div class="d-flex flex-grow-1">

    <div class="sidebar">
        <div class="menu-title">관리자 페이지</div>

        <div class="menu-category">데스크 업무</div>
        <a th:href="@{/admin/lending}">📅 대출 / 반납</a>
        <a th:href="@{/admin/lending/overdue}">⚠️ 연체 현황</a>

        <div class="menu-category">회원 관리</div>
        <a th:href="@{/admin/members}">👥 회원 조회 / 삭제</a>
        <a th:href="@{/admin/members/new}">➕ 회원 추가</a>

        <div class="menu-category">도서 관리</div>
        <a th:href="@{/admin/books}">📚 도서 조회 / 삭제</a>
        <a th:href="@{/admin/books/new}">➕ 도서 추가</a>
        <a th:href="@{/admin/wish-books}" class="active">✨ 희망도서 관리</a> 

        <div class="menu-category">리뷰</div>
        <a th:href="@{/admin/reviews}">💬 리뷰 관리</a>
    </div>

    <div class="content-area">
        <div class="container-fluid">
            
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-semibold">희망도서 관리</h2>
                <span class="badge bg-secondary bg-opacity-25 text-dark fs-6 rounded-pill border" 
                      th:text="'총 ' + ${wishPage.totalElements} + '건'"></span>
            </div>
            
            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <table class="table table-hover mb-0 align-middle">
                        <thead class="table-light border-bottom">
                            <tr>
                                <th class="ps-4">도서명 / 작가</th>
                                <th>신청자 (학번)</th>
                                <th>기부자 정보</th>
                                <th class="text-center">상태 관리</th>
                                <th class="text-center">삭제</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="item : ${wishPage.content}">
                                <td class="ps-4">
                                    <div class="fw-bold" th:text="${item.title}"></div>
                                    <div class="text-muted small" th:text="${item.writer}"></div>
                                    <a th:href="${item.url}" target="_blank" class="text-decoration-none small">
                                        [구매처 링크]
                                    </a>
                                </td>
                                <td>
                                    <span th:text="${item.member.name}"></span>
                                    <div class="text-muted small" th:text="'(' + ${item.member.studentNo} + ')'"></div>
                                </td>
                                
                                <td>
                                    <div th:if="${item.donorName != null}">
                                        <span class="fw-bold text-primary" th:text="${item.donorName}"></span>
                                        <span class="text-muted small" th:text="' | ' + ${item.donorPhone}"></span>
                                        <br>
                                        <a th:href="${item.deliveryUrl}" target="_blank" 
                                           class="badge bg-info text-white text-decoration-none mt-1">
                                            📦 배송정보 보기
                                        </a>
                                    </div>

                                    <div th:unless="${item.donorName != null}" class="text-muted small">
                                        - (미정)
                                    </div>
                                </td>
                                
                                <td class="text-center">
                                    <form th:if="${item.status.name() == 'APPLIED' or item.status.name() == 'DONATION'}"
                                          action="/admin/wish-books/status" method="post" class="d-inline">
                                        <input type="hidden" name="id" th:value="${item.id}">
                                        <input type="hidden" name="status" value="SHIPPING">
                                        <button type="submit" class="btn btn-sm btn-outline-primary fw-bold">
                                            🚚 배송 시작
                                        </button>
                                    </form>

                                    <form th:if="${item.status.name() == 'SHIPPING'}"
                                          action="/admin/wish-books/status" method="post" class="d-inline">
                                        <input type="hidden" name="id" th:value="${item.id}">
                                        <input type="hidden" name="status" value="STOCKED">
                                        <button type="submit" class="btn btn-sm btn-success text-white fw-bold">
                                            📚 입고 완료
                                        </button>
                                    </form>

                                    <span th:if="${item.status.name() == 'STOCKED'}" 
                                          class="badge bg-secondary p-2">
                                        소장중
                                    </span>
                                </td>

                                <td class="text-center">
                                    <form th:action="@{/admin/wish-books/delete}" method="post" onsubmit="return confirm('이 희망도서 신청을 삭제하시겠습니까?');">
                                        <input type="hidden" name="id" th:value="${item.id}">
                                        <button type="submit" class="btn btn-sm btn-outline-danger">삭제</button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${wishPage.empty}">
                                <td colspan="6" class="text-center py-5 text-muted">
                                    신청된 희망도서가 없습니다.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <nav th:if="${wishPage.totalPages > 1}" class="mt-4">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${wishPage.first} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/wish-books(page=${wishPage.number - 1})}">«</a>
                    </li>
                    <li class="page-item" 
                        th:each="i : ${#numbers.sequence(0, wishPage.totalPages - 1)}" 
                        th:classappend="${i == wishPage.number} ? 'active'">
                        <a class="page-link" th:text="${i + 1}"
                           th:href="@{/admin/wish-books(page=${i})}"></a>
                    </li>
                    <li class="page-item" th:classappend="${wishPage.last} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/wish-books(page=${wishPage.number + 1})}">»</a>
                    </li>
                </ul>
            </nav>

        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
