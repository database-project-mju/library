<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>관리자 - 연체 현황</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .sidebar {
            width: 250px;
            background-color: #f8f9fa;
            border-right: 1px solid #dee2e6;
            padding-top: 20px;
            flex-shrink: 0;
        }
        .sidebar .menu-title {
            font-size: 1.3rem;
            font-weight: bold;
            padding: 15px 20px;
            margin-bottom: 15px;
            background-color: #e9ecef; 
            border-radius: 10px;
            text-align: center;
        }
        .sidebar .menu-category {
            font-size: 0.85rem;
            font-weight: bold;
            color: #6c757d;
            padding: 10px 25px 5px;
            margin-top: 10px;
            text-transform: uppercase;
        }
        .sidebar a {
            padding: 10px 25px;
            display: block;
            font-size: 1rem;
            color: #333;
            text-decoration: none;
        }
        .sidebar a:hover {
            background-color: #e9ecef;
            color: #0d6efd;
        }
        .sidebar a.active {
            background-color: #dbe4ff;
            color: #0d6efd;
            font-weight: bold;
        }

        .content-area {
            padding: 40px;
            width: 100%;
        }

        table th, table td {
            vertical-align: middle;
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">

<div th:replace="~{fragments/nav :: navbar}"></div>

<div class="d-flex flex-grow-1">

    <div class="sidebar">
        <div class="menu-title">관리자 페이지</div>

        <div class="menu-category">데스크 업무</div>
        <a th:href="@{/admin/lending}">📅 대출 / 반납</a>
        <a th:href="@{/admin/lending/overdue}" class="active">⚠️ 연체 현황</a>

        <div class="menu-category">회원 관리</div>
        <a th:href="@{/admin/members}">👥 회원 조회 / 삭제</a>
        <a th:href="@{/admin/members/new}">➕ 회원 추가</a>

        <div class="menu-category">도서 관리</div>
        <a th:href="@{/admin/books}">📚 도서 조회 / 삭제</a>
        <a th:href="@{/admin/books/new}">➕ 도서 추가</a>

        <div class="menu-category">리뷰</div>
        <a th:href="@{/admin/reviews}">💬 리뷰 관리</a>
    </div>

    <div class="content-area">
        <div class="container-fluid">
            
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-semibold">연체 현황</h2>
                <span class="badge bg-danger fs-6 rounded-pill" 
                      th:text="'총 ' + ${overduePage.totalElements} + '건 연체'"></span>
            </div>

            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-light border-bottom">
                        <tr>
                            <th class="ps-4">도서 제목</th>
                            <th>대출자 (학번)</th>
                            <th>대출일</th>
                            <th>반납 예정일</th>
                            <th class="text-center">관리</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="loan : ${overduePage.content}">
                            <td class="ps-4 fw-bold" th:text="${loan.book.title}"></td>
                            <td>
                                <span th:text="${loan.member.name}"></span>
                                <small class="text-muted ms-1" th:text="'(' + ${loan.member.studentNo} + ')'"></small>
                            </td>
                            <td th:text="${#temporals.format(loan.lendDate, 'yyyy-MM-dd')}"></td>
                            <td class="text-danger fw-bold" th:text="${#temporals.format(loan.dueDate, 'yyyy-MM-dd')}"></td>
                            <td class="text-center">
                                <a th:href="@{/admin/lending(studentNo=${loan.member.studentNo})}"
                                   class="btn btn-sm btn-outline-danger">반납 처리</a>
                            </td>
                        </tr>
                        <tr th:if="${overduePage.empty}">
                            <td colspan="5" class="text-center py-5 text-muted">
                                현재 연체된 도서가 없습니다.
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <nav th:if="${overduePage.totalPages > 1}" class="mt-4">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${overduePage.first} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/lending/overdue(page=${overduePage.number - 1})}">«</a>
                    </li>
                    
                    <li class="page-item" 
                        th:each="i : ${#numbers.sequence(0, overduePage.totalPages - 1)}" 
                        th:classappend="${i == overduePage.number} ? 'active'">
                        <a class="page-link" th:text="${i + 1}"
                           th:href="@{/admin/lending/overdue(page=${i})}"></a>
                    </li>

                    <li class="page-item" th:classappend="${overduePage.last} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/lending/overdue(page=${overduePage.number + 1})}">»</a>
                    </li>
                </ul>
            </nav>

        </div>
    </div>

</div> 

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
