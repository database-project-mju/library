<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>관리자 - 신규 도서 등록</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .sidebar {
            width: 250px;
            background-color: #f8f9fa;
            border-right: 1px solid #dee2e6;
            padding-top: 20px;
            flex-shrink: 0;
        }
        .sidebar .menu-title {
            font-size: 1.3rem;
            font-weight: bold;
            padding: 15px 20px;
            margin-bottom: 15px;
            background-color: #e9ecef; 
            border-radius: 10px;
            text-align: center;
        }
        .sidebar .menu-category {
            font-size: 0.85rem;
            font-weight: bold;
            color: #6c757d;
            padding: 10px 25px 5px;
            margin-top: 10px;
            text-transform: uppercase;
        }
        .sidebar a {
            padding: 10px 25px;
            display: block;
            font-size: 1rem;
            color: #333;
            text-decoration: none;
        }
        .sidebar a:hover {
            background-color: #e9ecef;
            color: #0d6efd;
        }
        .sidebar a.active {
            background-color: #dbe4ff;
            color: #0d6efd;
            font-weight: bold;
        }

        .content-area {
            padding: 40px;
            width: 100%;
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">

<div th:replace="~{fragments/nav :: navbar}"></div>

<div class="d-flex flex-grow-1">

    <div class="sidebar">
        <div class="menu-title">관리자 페이지</div>

        <div class="menu-category">데스크 업무</div>
        <a th:href="@{/admin/lending}">📅 대출 / 반납</a>
        <a th:href="@{/admin/lending/overdue}">⚠️ 연체 현황</a>

        <div class="menu-category">회원 관리</div>
        <a th:href="@{/admin/members}">👥 회원 조회 / 삭제</a>
        <a th:href="@{/admin/members/new}">➕ 회원 추가</a>

        <div class="menu-category">도서 관리</div>
        <a th:href="@{/admin/books}">📚 도서 조회 / 삭제</a>
        <a th:href="@{/admin/books/new}" class="active">➕ 도서 추가</a>
        <a th:href="@{/admin/wish-books}" >✨ 희망도서 관리</a> 

        <div class="menu-category">리뷰</div>
        <a th:href="@{/admin/reviews}">💬 리뷰 관리</a>
    </div>

    <div class="content-area">
        <div class="container-fluid">
            
            <h2 class="fw-semibold mb-4">신규 도서 등록</h2>

            <div class="card shadow-sm">
                <div class="card-body p-5">
                    <form th:action="@{/admin/books/create}" method="POST">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="isbn" class="form-label fw-bold">ISBN</label>
                                    <input type="text" class="form-control" id="isbn" name="isbn" placeholder="ISBN 번호를 입력하세요" required>
                                </div>
                                <div class="mb-3">
                                    <label for="title" class="form-label fw-bold">도서 제목</label>
                                    <input type="text" class="form-control" id="title" name="title" placeholder="도서 제목을 입력하세요" required>
                                </div>
                                <div class="mb-3">
                                    <label for="writer" class="form-label fw-bold">저자</label>
                                    <input type="text" class="form-control" id="writer" name="writer" placeholder="저자명을 입력하세요" required>
                                </div>
                                <div class="mb-3">
                                    <label for="publisher" class="form-label fw-bold">출판사</label>
                                    <input type="text" class="form-control" id="publisher" name="publisher" placeholder="출판사명을 입력하세요" required>
                                </div>
                                <div class="mb-3">
                                    <label for="publishDate" class="form-label fw-bold">출판일</label>
                                    <input type="date" class="form-control" id="publishDate" name="publishDate" required>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="page" class="form-label fw-bold">페이지 수</label>
                                    <input type="number" class="form-control" id="page" name="page" placeholder="예: 300" required>
                                </div>
                                <div class="mb-3">
                                    <label for="imageUrl" class="form-label fw-bold">이미지 URL</label>
                                    <input type="text" class="form-control" id="imageUrl" name="imageUrl" placeholder="http://...">
                                </div>
                                <div class="mb-3">
                                    <label for="category" class="form-label fw-bold">카테고리</label>
                                    <select class="form-select" id="category" name="category">
                                        <option value="">카테고리 선택</option>
                                        <option th:each="cat : ${categories}"
                                                th:value="${cat.name()}"
                                                th:text="${cat.korean}">카테고리</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label for="description" class="form-label fw-bold">도서 설명</label>
                                    <textarea class="form-control" id="description" name="description" rows="5" placeholder="도서에 대한 간단한 설명을 입력하세요"></textarea>
                                </div>
                            </div>
                        </div>

                        <hr class="my-4">

                        <div class="d-flex justify-content-end gap-2">
                            <button type="submit" class="btn btn-primary px-4">도서 등록</button>
                            <a href="/admin/books" class="btn btn-secondary px-4">취소</a>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>

</div> 

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
