<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>관리자 - 신규 도서 등록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<!-- ✅ 1. <body> 태그에 레이아웃 클래스 적용 -->
<body class="bg-light d-flex flex-column min-vh-100">

    <!-- ✅ 2. 네비게이션 바 추가 -->
    <div th:replace="~{fragments/nav :: navbar}"></div>

    <!-- ✅ 3. 콘텐츠 래퍼(Wrapper) 추가 -->
    <div class="container my-5 flex-grow-1">

        <h1 class="fw-semibold mb-4">신규 도서 등록 (수동)</h1>
        
        <form th:action="@{/admin/books/create}" method="POST">
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="isbn" class="form-label">ISBN</label>
                        <input type="text" class="form-control" id="isbn" name="isbn" required>
                    </div>
                    <div class="mb-3">
                        <label for="title" class="form-label">도서 제목</label>
                        <input type="text" class="form-control" id="title" name="title" required>
                    </div>
                    <div class="mb-3">
                        <label for="writer" class="form-label">저자</label>
                        <input type="text" class="form-control" id="writer" name="writer" required>
                    </div>
                    <div class="mb-3">
                        <label for="publisher" class="form-label">출판사</label>
                        <input type="text" class="form-control" id="publisher" name="publisher" required>
                    </div>
                    <div class="mb-3">
                        <label for="publishDate" class="form-label">출판일</label>
                        <input type="date" class="form-control" id="publishDate" name="publishDate" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="page" class="form-label">페이지 수</label>
                        <input type="number" class="form-control" id="page" name="page" required>
                    </div>
                    <div class="mb-3">
                        <label for="imageUrl" class="form-label">이미지 URL</label>
                        <input type="text" class="form-control" id="imageUrl" name="imageUrl" placeholder="http://...">
                    </div>
                    <div class="mb-3">
                        <label for="category" class="form-label">카테고리</label>
                        <select class="form-select" id="category" name="category">
                            <option th:each="cat : ${categories}"
                                    th:value="${cat.name()}"
                                    th:text="${cat.korean}">카테고리 선택</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">도서 설명</label>
                        <textarea class="form-control" id="description" name="description" rows="5"></textarea>
                    </div>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary">도서 등록</button>
            <a href="/admin/books" class="btn btn-secondary">취소</a>
        </form>

    </div> <!-- ✅ 3. 콘텐츠 래퍼 닫기 -->
    
    <!-- ✅ 4. 푸터 추가 (<body> 닫기 직전) -->
    <div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
