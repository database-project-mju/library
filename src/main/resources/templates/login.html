<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인 - 명지대학교 도서관</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* 로그인 카드 그림자 및 스타일 */
        .login-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        /* 입력창 포커스 시 효과 */
        .form-control:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
        }
    </style>
</head>

<body class="bg-light d-flex flex-column min-vh-100">

    <div th:replace="~{fragments/nav :: navbar}"></div>

    <div class="container d-flex flex-column justify-content-center flex-grow-1">
        <div class="row justify-content-center">
            
            <div class="col-12 col-md-8 col-lg-5">
                
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-primary">📚 명지대학교 도서관</h2>
                    <p class="text-muted mb-0">도서관 서비스 이용을 위해 로그인해주세요.</p>
                </div>

                <div class="card login-card bg-white p-4 p-md-5 py-5">
                    <form method="post" action="/login">
                        
                        <div th:if="${param.error}" class="alert alert-danger text-center p-2 mb-4" role="alert">
                            <i class="bi bi-exclamation-circle-fill"></i> 
                            <small>학번 또는 비밀번호를 확인해주세요.</small>
                        </div>
                        <div th:if="${param.logout}" class="alert alert-success text-center p-2 mb-4" role="alert">
                            <i class="bi bi-check-circle-fill"></i> 
                            <small>성공적으로 로그아웃 되었습니다.</small>
                        </div>

                        <div class="mb-4"> <label for="username" class="form-label fw-semibold">학번</label>
                            <input type="text" id="username" name="username" class="form-control form-control-lg" 
                                   placeholder="예: 60210000" required autofocus>
                        </div>

                        <div class="mb-5"> <label for="password" class="form-label fw-semibold">비밀번호</label>
                            <input type="password" id="password" name="password" class="form-control form-control-lg" 
                                   placeholder="비밀번호 입력" required>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg fw-bold py-3">로그인</button>
                        </div>

                    </form>
                </div>

            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
