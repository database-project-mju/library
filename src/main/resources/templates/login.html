<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
</head>
<body>
<h2>로그인 페이지</h2>

<form method="post" action="/login">
    <label>학번:</label>
    <input type="text" name="username" placeholder="학번 입력" required><br>

    <label>비밀번호:</label>
    <input type="password" name="password" placeholder="비밀번호 입력" required><br>

    <button type="submit">로그인</button>
</form>

<p style="color:red;">
    <th:block th:if="${param.error}">❌ 로그인 실패 — 학번 또는 비밀번호를 확인하세요.</th:block>
</p>

<p style="color:green;">
    <th:block th:if="${param.logout}">✅ 로그아웃 완료되었습니다.</th:block>
</p>

</body>
</html>
