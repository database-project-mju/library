<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>희망도서 목록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <div th:replace="~{fragments/nav :: navbar}"></div>

    <div class="container my-5 flex-grow-1">
        
        <div class="d-flex justify-content-between align-items-center mb-2">
            <h2 class="fw-semibold">✨ 희망도서 신청 현황</h2>
            <a th:href="@{/wish-book/new}" class="btn btn-primary">
                + 희망도서 신청하기
            </a>
        </div>

        <div class="alert alert-light border shadow-sm mb-4">
            <i class="bi bi-geo-alt-fill text-danger me-2"></i>
            <strong>도서 기부 보내실 곳:</strong> 서울특별시 서대문구 거북골로 34 명지대학교 도서관 (우)03674
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover mb-0 align-middle">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4">도서명</th>
                            <th>작가</th>
                            <th>구매링크</th>
                            <th>신청자</th>
                            <th>기부자</th>
                            <th>신청일</th>
                            <th class="text-center" style="width: 150px;">상태 / 기부</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${wishPage.content}">
                            <td class="ps-4 fw-bold" th:text="${item.title}"></td>
                            <td th:text="${item.author}"></td>
                            <td>
                                <a th:href="${item.url}" target="_blank" class="btn btn-sm btn-outline-secondary">
                                    구매처 🔗
                                </a>
                            </td>
                            <td th:text="${item.member.name}"></td>
                            
                            <td>
                                <span th:if="${item.donorName != null}" th:text="${item.donorName}" class="fw-bold text-primary"></span>
                                <span th:if="${item.donorName == null}" class="text-muted">-</span>
                            </td>

                            <td th:text="${#temporals.format(item.createdAt, 'yyyy-MM-dd')}"></td>
                            
                            <td class="text-center">
                                
                                <button th:if="${item.status.name() == 'APPLIED'}" 
                                        type="button" 
                                        class="btn btn-sm btn-success fw-bold"
                                        data-bs-toggle="modal" 
                                        data-bs-target="#donationModal"
                                        th:data-id="${item.id}"
                                        th:data-title="${item.title}"
                                        onclick="setDonationTarget(this)">
                                    🎁 기부하기
                                </button>

                                <span th:if="${item.status.name() == 'DONATION'}" 
                                      class="badge bg-secondary">
                                    기부 예정
                                </span>

                                <span th:if="${item.status.name() == 'SHIPPING'}" 
                                      class="badge bg-primary">
                                    🚚 배송중
                                </span>

                                <span th:if="${item.status.name() == 'STOCKED'}" 
                                      class="badge bg-success">
                                    ✅ 입고완료
                                </span>
                            </td>
                        </tr>
                        <tr th:if="${wishPage.empty}">
                            <td colspan="7" class="text-center py-5 text-muted">신청된 희망도서가 없습니다.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <nav th:if="${wishPage.totalPages > 1}" class="mt-4">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${wishPage.first} ? 'disabled'">
                    <a class="page-link" th:href="@{/wish-book(page=${wishPage.number - 1})}">«</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, wishPage.totalPages - 1)}"
                    th:classappend="${i == wishPage.number} ? 'active'">
                    <a class="page-link" th:text="${i + 1}" th:href="@{/wish-book(page=${i})}"></a>
                </li>
                <li class="page-item" th:classappend="${wishPage.last} ? 'disabled'">
                    <a class="page-link" th:href="@{/wish-book(page=${wishPage.number + 1})}">»</a>
                </li>
            </ul>
        </nav>
    </div>

    <div class="modal fade" id="donationModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">🎁 도서 기부 신청</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form action="/wish-book/donate" method="post">
                    <div class="modal-body">
                        <p class="text-muted mb-3">
                            "<span id="modalBookTitle" class="fw-bold text-primary"></span>" 도서를 기부해 주셔서 감사합니다.<br>
                            기부자 식별을 위해 성함과 연락처를 입력해 주세요.<br>
                            주문 완료 이후 기부 신청을 해주세요.
                        </p>
                        
                        <input type="hidden" name="id" id="modalBookId">

                        <div class="mb-3">
                            <label class="form-label fw-bold">기부자 성함</label>
                            <input type="text" name="donorName" class="form-control" placeholder="예: 김기부" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">연락처</label>
                            <input type="text" name="donorPhone" class="form-control" placeholder="예: +82 010-1234-5678" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">배송/주문 내역 URL</label>
                            <input type="text" name="deliveryUrl" class="form-control" placeholder="주문 내역 링크를 반드시 입력해주세요" required>
                            <div class="form-text small">관리자만 확인할 수 있습니다.</div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                        <button type="submit" class="btn btn-success fw-bold">기부 신청 완료</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script>
        function setDonationTarget(button) {
            var bookId = button.getAttribute("data-id");
            var bookTitle = button.getAttribute("data-title");
            document.getElementById("modalBookId").value = bookId;
            document.getElementById("modalBookTitle").innerText = bookTitle;
        }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
