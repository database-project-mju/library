<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>희망도서 신청</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <div th:replace="~{fragments/nav :: navbar}"></div>

    <div class="container my-5 flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <h2 class="fw-semibold mb-4 text-center">✨ 희망도서 신청</h2>
                
                <a href="https://www.amazon.com/amz-books/store?ou=psf&ref_=usbk_surl_books" 
                   target="_blank" 
                   class="btn btn-info text-white w-100 mb-4 py-2 fw-bold shadow-sm">
                    🌏 희망도서 둘러보기 (Amazon Books)
                </a>

                <div class="card shadow-sm border-0 mb-3">
                    <div class="card-body p-4 p-md-5">
                        <form action="/wish-book/new" method="post">
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">책 제목</label>
                                <input type="text" name="title" class="form-control" required placeholder="책 제목을 입력하세요">
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">작가</label>
                                <input type="text" name="author" class="form-control" required placeholder="작가를 입력하세요">
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label fw-bold">구매 URL</label>
                                <input type="url" name="url" class="form-control" required placeholder="https://...">
                                <div class="form-text">위 '둘러보기' 버튼을 통해 확인한 URL을 복사해 주세요.</div>
                            </div>
                            
                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <a href="/wish-book" class="btn btn-secondary px-4">취소</a>
                                <button type="submit" class="btn btn-primary px-4">신청하기</button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="text-center text-danger fw-bold small">
                    ※ 부적절한 도서(음란, 폭력, 상업적 홍보 등)는 관리자 검토 후 임의로 삭제될 수 있습니다.
                </div>

            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
