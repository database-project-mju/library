<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar-center {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }
    </style>
</head>
<body>
<!-- ✅ 공통 네비게이션 -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary" th:fragment="navbar">
    <div class="container-fluid position-relative">

        <!-- 왼쪽 로고 -->
        <a class="navbar-brand fw-bold" href="/" style="font-size: 1.2rem;">
            📚 명지대학교 도서관
        </a>

        <!-- 중앙 검색창 -->
        <div class="navbar-center">
            <form class="d-flex" th:action="@{/book/search}" method="get">
                <input class="form-control me-2 rounded-pill" type="search" name="keyword"
                       placeholder="도서 제목 또는 저자 검색" aria-label="Search" style="width: 300px;">
                <button class="btn btn-light rounded-pill text-primary fw-semibold" type="submit">검색</button>
            </form>
        </div>

        <!-- 오른쪽 버튼 -->
        <div class="ms-auto d-flex align-items-center">
            <a href="/mypage" class="btn btn-outline-light btn-sm me-2 fw-semibold">내서재</a>
            <a href="/login" class="btn btn-light btn-sm text-primary fw-semibold">로그인</a>
        </div>
    </div>
</nav>
</body>
</html>
