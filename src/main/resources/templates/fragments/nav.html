<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar-center {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }
    </style>
</head>
<body>
<!-- ✅ 공통 네비게이션 -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary" th:fragment="navbar">
    <div class="container-fluid position-relative">

        <!-- 왼쪽 로고 -->
        <a class="navbar-brand fw-bold" href="/" style="font-size: 1.2rem;">
            📚 명지대학교 도서관
        </a>

        <!-- 중앙 검색창 -->
        <div class="navbar-center">
            <form class="d-flex" th:action="@{/book/search}" method="get">
                <input class="form-control me-2 rounded-pill" type="search" name="keyword"
                       placeholder="도서 제목 또는 저자 검색" aria-label="Search" style="width: 300px;">
                <button class="btn btn-light rounded-pill text-primary fw-semibold" type="submit">검색</button>
            </form>
        </div>
        <div class="ms-auto d-flex align-items-center gap-2">

            <!-- ✅ 로그인하지 않은 경우 -->
            <a sec:authorize="!isAuthenticated()"
               th:href="@{/login}"
               class="btn btn-light btn-sm text-primary fw-semibold">
                로그인
            </a>

            <!-- ✅ 로그인한 경우 -->
            <div sec:authorize="isAuthenticated()" class="d-flex align-items-center gap-2">

                <!-- ✅ 'null' 오류 방지 -->
                <span th:text="'안녕하세요, ' + ${#authentication.principal.member.name} + '님'"
                      class="text-white fw-semibold small"></span>

                <!-- 관리자 전용 버튼 -->
                <th:block sec:authorize="hasRole('ADMIN')">
                    
                    <a th:if="${#strings.startsWith(currentUri, '/admin')}"
                       th:href="@{/}"
                       class="btn btn-outline-light btn-sm fw-semibold"> 도서관 홈
                    </a>
                    
                    <a th:unless="${#strings.startsWith(currentUri, '/admin')}"
                       th:href="@{/admin}"
                       class="btn btn-warning btn-sm fw-semibold"> 관리자 페이지
                    </a>
                    
                </th:block>

                <!-- 학생 전용 버튼 -->
                <a sec:authorize="hasRole('STUDENT')"
                   th:href="@{/mypage/lends}"
                   class="btn btn-outline-light btn-sm fw-semibold">
                    내 서재
                </a>

                <!-- 로그아웃 버튼 -->
                <form th:action="@{/logout}" method="post" class="m-0">
                    <button type="submit" class="btn btn-outline-light btn-sm fw-semibold">로그아웃</button>
                </form>
            </div>
        </div>
    </div>
</nav>
</body>
</html>
